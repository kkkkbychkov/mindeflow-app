<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindFlow — Личная продуктивность</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <header class="sidebar-header">
                <div id="mode-toggle" class="toggle-bg bg-slate-700">
                    <div id="toggle-circle" class="toggle-dot">
                        <img id="toggle-icon" src="https://images.icon-icons.com/1446/PNG/512/22212monkey_98814.png" alt="mode">
                    </div>
                </div>
                <div class="brand">
                    <h2 class="brand-title">MindFlow</h2>
                    <p class="brand-subtitle">Джедайские техники</p>
                </div>
            </header>

            <nav class="nav-menu">
                <a href="#" class="nav-item active">
                    <i class="fa-solid fa-inbox"></i> Входящие
                    <span id="sidebar-inbox-count" class="badge">0</span>
                </a>
                <a id="nav-tasks" href="#" class="nav-item"><i class="fa-regular fa-square-check"></i> Задачи</a>
                <a id="nav-projects" href="#" class="nav-item"><i class="fa-solid fa-layer-group"></i> Проекты</a>
            </nav>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h1 id="header-title" class="page-title">Загрузка...</h1>
                <div class="top-bar-actions">
                    <button id="add-task-btn-main" class="btn-primary">
                        <i class="fa-solid fa-plus text-xs"></i> Добавить
                    </button>
                </div>
            </header>

            <div class="scroll-area">
                <div class="content-grid">
                    <div class="col-main">
                        <section class="card">
                            <div class="card-header">
                                <div>
                                    <h3 class="card-title text-xl font-bold">Inbox</h3>
                                    <p class="card-subtitle text-sm text-slate-500">Поток входящих задач</p>
                                </div>
                                <button id="add-to-inbox-btn" class="btn-secondary">
                                    Добавить
                                </button>
                            </div>

                            <div id="monkey-action-area" class="monkey-module">
                                <button id="get-task-monkey" class="btn-monkey">
                                    <i class="fa-solid fa-bolt-lightning"></i> Дай задачу
                                </button>
                                
                                <div id="active-monkey-task-card" class="focus-task-card hidden">
                                    <div class="focus-content">
                                        <span class="focus-badge">ТЕКУЩИЙ ФОКУС</span>
                                        <div id="monkey-task-text" class="focus-text"></div>
                                    </div>
                                    <button id="complete-monkey-task" class="btn-complete-focus">
                                        Готово
                                    </button>
                                </div>
                            </div>

                            <div id="inbox-list" class="task-list"></div>
                            
                            <div id="inbox-empty-state" class="empty-state hidden">
                                <p>Входящих задач нет 🎉</p>
                            </div>
                        </section>
                    </div>

                    <div class="col-side">
                        <section id="card-tasks" class="card">
                            <h3 class="card-title text-lg font-bold mb-4">В работе</h3>
                            <div id="tasks-list"></div>
                        </section>

                        <section id="card-projects" class="card">
                            <h3 class="card-title text-lg font-bold mb-4">Проекты</h3>
                            <div class="project-card">
                                <h4 class="font-bold text-slate-800">Разработка MindFlow</h4>
                                <p class="text-xs text-slate-500 mt-1 italic">Статус: В активной фазе</p>
                            </div>
                        </section>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>
</html>
